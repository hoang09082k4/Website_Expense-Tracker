name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  docker-compose-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose -f docker-compose.yml config

  frontend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install Frontend dependencies
        run: npm ci
        working-directory: ./Frontend

      - name: Lint Frontend
        run: npm run lint
        working-directory: ./Frontend
        continue-on-error: false

      - name: Test Frontend
        run: npm run test --if-present
        working-directory: ./Frontend
        continue-on-error: false
      
      - name: Build Frontend
        run: npm run build
        working-directory: ./Frontend
        continue-on-error: false

  my-app-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: my-app/package-lock.json

      - name: Install my-app dependencies
        run: npm ci
        working-directory: ./my-app

      - name: Lint my-app
        run: npm run lint
        working-directory: ./my-app
        continue-on-error: false

      - name: Test my-app
        run: npm run test --if-present
        working-directory: ./my-app
        continue-on-error: false
      
      - name: Build my-app
        run: npm run build
        working-directory: ./my-app
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        continue-on-error: false

  expense-manager-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: my-app/expense-manager/package-lock.json

      - name: Install expense-manager dependencies
        run: npm ci
        working-directory: ./my-app/expense-manager

      - name: Lint expense-manager
        run: npm run lint
        working-directory: ./my-app/expense-manager
        continue-on-error: false

      - name: Test expense-manager
        run: npm run test --if-present
        working-directory: ./my-app/expense-manager
        continue-on-error: false
      
      - name: Build expense-manager
        run: npm run build
        working-directory: ./my-app/expense-manager
        continue-on-error: false
